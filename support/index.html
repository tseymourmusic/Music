<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter of Support | Tales For All Time</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; 
            color: #FFFFFF;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        .viewer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 140px 20px 100px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 { 
            font-size: clamp(1.8rem, 8vw, 2.8rem); 
            letter-spacing: 12px; 
            margin-bottom: 60px; 
            font-weight: 100; 
            text-transform: uppercase;
            text-align: center;
            width: 100%;
        }

        /* THE VELVET POP BOX */
        .letter-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            background: #fff;
            aspect-ratio: 1 / 1.414; /* Standard A4 ratio */
            border-radius: 2px;
            margin-bottom: 80px;

            /* MULTI-LAYER SHADOW */
            box-shadow: 
                0 5px 15px rgba(0,0,0,0.5),      
                0 30px 80px rgba(0,0,0,0.8),     
                0 0 40px rgba(212, 175, 55, 0.1); 
                
            z-index: 1; 
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* MATCHING THE CHAPTER I BUTTON STYLE */
        .back-link {
            display: inline-block;
            padding: 15px 40px;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            color: #D4AF37;
            text-decoration: none;
            border: 1px solid #D4AF37;
            background: rgba(212, 175, 55, 0.05);
            text-transform: uppercase;
            transition: all 0.4s ease;
            animation: pulse-glow 3s infinite;
            cursor: pointer;
        }

        @keyframes pulse-glow {
            0%, 100% { 
                box-shadow: 0 0 5px rgba(212, 175, 55, 0.1); 
                border-color: rgba(212, 175, 55, 0.4); 
            }
            50% { 
                box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); 
                border-color: rgba(212, 175, 55, 1); 
            }
        }

        .back-link:hover {
            background: #D4AF37;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media screen and (max-width: 768px) {
            .viewer-container {
                padding: 100px 15px 60px;
            }

            h1 {
                letter-spacing: 4px; /* Prevents 3-row break */
                margin-bottom: 40px;
                font-size: 1.6rem;
            }

            .letter-wrapper {
                aspect-ratio: auto; 
                height: 65vh; /* Prevents "huge" letter scroll on mobile */
                margin-bottom: 50px;
            }

            .back-link {
                padding: 12px 30px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="viewer-container">
        <h1>Letter of Support</h1>

        <div class="letter-wrapper">
            <iframe src="/pdfs/lcv-endorsement-letter-for-tim-seymour.pdf#view=FitH&toolbar=0&navpanes=0"></iframe>
        </div>

        <a href="/music/tales-for-all-time/index.html#bottom" target="_self" class="back-link">
            Resume the Tale
        </a>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        // Standard menu/footer loaders
        fetch('/menu.html').then(res => res.text()).then(data => {
            document.getElementById('nav-placeholder').innerHTML = data;
        });

        fetch('/footer.html').then(res => res.text()).then(data => {
            document.getElementById('footer-placeholder').innerHTML = data;
        });

        // Fixed nav background logic
        window.onscroll = function() {
            var nav = document.getElementById('main-nav');
            if (nav) {
                nav.style.background = (window.pageYOffset > 50) ? "rgba(10, 10, 10, 0.98)" : "rgba(10, 10, 10, 0.95)";
            }
        };
    </script>

</body>
</html>
