<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live | Tim Seymour Composer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="menu.css">

    <style>
        body, html { 
            margin: 0; padding: 0; 
            background-color: #1a1f21; 
            color: #FFFFFF; 
            font-family: 'Montserrat', sans-serif; 
        }
        
        .live-container { 
            max-width: 1000px; 
            margin: 120px auto 100px; 
            padding: 0 20px; 
            text-align: center; 
        }
        
        h1 { 
            font-size: 2.8rem; 
            letter-spacing: 12px; 
            margin-bottom: 60px; 
            font-weight: 100; 
            text-transform: uppercase;
        }

        /* --- CAROUSEL STYLING --- */
        .carousel-wrapper {
            position: relative;
            margin-bottom: 80px;
        }

        .poster-carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 20px;
            padding: 20px 0;
            scrollbar-width: none; /* Hide scrollbar Firefox */
            -ms-overflow-style: none; /* Hide scrollbar IE/Edge */
        }

        .poster-carousel::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

        .carousel-item {
            flex: 0 0 300px; /* Width of each poster */
            scroll-snap-align: center;
            transition: transform 0.4s ease;
        }

        .carousel-item img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            /* Prevents desktop drag interference */
            pointer-events: none;
            user-select: none;
        }

        .carousel-item:hover {
            transform: translateY(-10px);
        }

        /* --- NAVIGATION BUTTONS --- */
        .carousel-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .nav-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: #666;
            padding: 5px 15px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .nav-btn:hover {
            color: #fff;
            border-color: #D4AF37;
            background: rgba(255,255,255,0.05);
        }

        .carousel-hint {
            font-size: 0.7rem;
            opacity: 0.4;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
        }

        /* --- DATES LIST STYLING --- */
        .dates-content {
            text-align: left;
            max-width: 750px;
            margin: 0 auto;
        }

        h2 {
            font-weight: 200;
            letter-spacing: 4px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 10px;
            margin: 60px 0 30px;
            text-transform: uppercase;
            color: #D4AF37;
        }

        .event-group {
            padding-left: 25px;
            border-left: 1px solid rgba(212, 175, 55, 0.1);
            margin-bottom: 40px;
        }

        .date-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 18px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .date-day { font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 4px; }
        .event-title { font-weight: 200; opacity: 0.8; letter-spacing: 1px; }
        .venue-location { font-size: 0.9rem; color: #D4AF37; font-weight: 300; }

        h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
            font-weight: 400;
        }

        .past-row { opacity: 0.5; }

        #footer-placeholder { margin-top: 100px; padding-bottom: 40px; }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="live-container">
        <h1>LIVE</h1>

        <div class="carousel-wrapper">
            <div class="poster-carousel" id="liveCarousel">
                <div class="carousel-item">
                    <img src="images/rising-star-concert-poster.jpg" alt="Saviour">
                </div>
                <div class="carousel-item">
                    <img src="images/cry-concert-poster.jpg" alt="Cry of the Forest">
                </div>
                <div class="carousel-item">
                    <img src="images/fantasia-concert-poster.jpg" alt="Fantasia (Water & Truth)">
                </div>
            </div>

            <div class="carousel-nav">
                <button class="nav-btn" onclick="scrollLiveCarousel(-1)">«</button>
                <p class="carousel-hint">SCROLL TO VIEW</p>
                <button class="nav-btn" onclick="scrollLiveCarousel(1)">»</button>
            </div>
        </div>

        <div class="dates-content">
            
            <h2>Upcoming Dates</h2>
            <div class="event-group">
                <div class="date-row">
                    <div class="date-info">
                        <span class="date-day">Q4 2026</span>
                        <span class="event-title">Tales for All Time</span>
                    </div>
                    <div class="venue-location">TBC</div>
                </div>
            </div>

            <h2>Past Concerts</h2>
            
            <div class="event-group">
                <h3>Premiers</h3>
                <div class="date-row past-row">
                    <div class="date-info">
                        <span class="date-day">01 NOV 2025</span>
                        <span class="event-title">Saviour Premier</span>
                    </div>
                    <div class="venue-location">St Thomas' Church, Lymington</div>
                </div>
                <div class="date-row past-row">
                    <div class="date-info">
                        <span class="date-day">12 JUL 2024</span>
                        <span class="event-title">Cry of the Forest Premiere</span>
                    </div>
                    <div class="venue-location">St Thomas' Church, Lymington</div>
                </div>
                <div class="date-row past-row">
                    <div class="date-info">
                        <span class="date-day">17 JUN 2023</span>
                        <span class="event-title">Fantasia Music</span>
                    </div>
                    <div class="venue-location">St Thomas' Church, Lymington</div>
                </div>
            </div>

        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        // Script to handle Live carousel navigation
        function scrollLiveCarousel(direction) {
            const carousel = document.getElementById('liveCarousel');
            // Scrolls by one item width (300px) + gap (20px)
            const scrollAmount = 320; 
            carousel.scrollBy({
                left: direction * scrollAmount,
                behavior: 'smooth'
            });
        }

        // Placeholders
        fetch('menu.html').then(res => res.text()).then(data => {
            document.getElementById('nav-placeholder').innerHTML = data;
        });
        fetch('footer.html').then(res => res.text()).then(data => {
            document.getElementById('footer-placeholder').innerHTML = data;
        });
    </script>
</body>
</html>
