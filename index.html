<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawyered Up Player</title>
    <!-- Import Montserrat Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 50px; 
        }
        
        /* Main Player Container - Light Grey Background */
        .player-container { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            background: #d3d3d3; /* Light Grey Container */
            padding: 15px 20px;
            border-radius: 50px; /* Rounded pill shape */
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        audio { 
            height: 40px;
            filter: grayscale(1) invert(1); /* Makes the native player look darker/sleeker */
        }
        
        /* Skip Buttons inside the container */
        .skip-btn {
            background: #1e1e1e; /* Dark buttons to contrast the light grey bar */
            color: #d3d3d3;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.3s;
        }
        .skip-btn:hover { 
            background: #000; 
            transform: scale(1.1);
        }

        /* Playlist Styling */
        #playlist { list-style: none; padding: 0; width: 350px; }
        .track { 
            padding: 15px; 
            background: #1e1e1e; 
            margin-bottom: 8px; 
            cursor: pointer; 
            border-radius: 8px;
            transition: all 0.3s;
            border-left: 5px solid transparent;
            font-size: 0.9rem;
        }
        .track:hover { background: #2a2a2a; }
        
        /* Light Grey Highlight for Active Track */
        .track.active { 
            border-left: 5px solid #d3d3d3; 
            background: #333; 
            color: #d3d3d3; 
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- Combined Player Bar -->
    <div class="player-container">
        <button class="skip-btn" id="prevBtn" title="Previous">«</button>
        
        <audio id="audio" controls preload="auto">
            <source id="audio-source" src="Lawyered Up Pt1.m4a" type="audio/mp4">
        </audio>

        <button class="skip-btn" id="nextBtn" title="Next">»</button>
    </div>

    <!-- Playlist -->
    <ul id="playlist">
        <li class="track active" data-src="Lawyered Up Pt1.m4a">Lawyered Up - Part 1</li>
        <li class="track" data-src="Lawyered Up Pt2.m4a">Lawyered Up - Part 2</li>
        <li class="track" data-src="Lawyered Up Pt3.m4a">Lawyered Up - Part 3</li>
    </ul>

    <script>
        const audio = document.getElementById('audio');
        const source = document.getElementById('audio-source');
        const tracks = document.querySelectorAll('.track');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function playTrack(trackElement) {
            const nextTrackSrc = trackElement.getAttribute('data-src');
            source.src = nextTrackSrc;
            audio.load();
            audio.play();
            
            // Update UI Styling
            tracks.forEach(t => t.classList.remove('active'));
            trackElement.classList.add('active');
        }

        // Playlist click event
        tracks.forEach(track => {
            track.addEventListener('click', function() {
                playTrack(this);
            });
        });

        // Next Logic
        nextBtn.addEventListener('click', () => {
            let current = document.querySelector('.track.active');
            let next = current.nextElementSibling;
            if (next && next.classList.contains('track')) {
                playTrack(next);
            } else {
                playTrack(tracks[0]); // Loop back to top
            }
        });

        // Prev Logic
        prevBtn.addEventListener('click', () => {
            let current = document.querySelector('.track.active');
            let prev = current.previousElementSibling;
            if (prev && prev.classList.contains('track')) {
                playTrack(prev);
            } else {
                playTrack(tracks[tracks.length - 1]); // Loop to end
            }
        });

        // Auto-play next track
        audio.addEventListener('ended', () => {
            nextBtn.click();
        });
    </script>

</body>
</html>
