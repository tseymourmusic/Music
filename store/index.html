<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store | Tim Seymour Composer</title>
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/menu.css">

    <style>
        :root { --gold: #D4AF37; }

        body, html { 
            margin: 0; padding: 0; 
            background-color: #0a0a0a; 
            color: #FFFFFF; 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
        }

        .store-container { 
            max-width: 1100px; 
            margin: 140px auto 100px; /* Aligned margin with Contact page */
            padding: 0 20px; 
        }

        /* Page Title to match Contact page */
        .page-title { 
            font-size: clamp(2rem, 8vw, 3rem); 
            letter-spacing: 15px; 
            margin-bottom: 60px; 
            font-weight: 100; 
            text-transform: uppercase;
            text-align: center;
            color: #FFFFFF;
        }

        .product-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 60px;
            align-items: flex-start;
            background: rgba(255, 255, 255, 0.02);
            padding: 60px 40px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Image & Ethereal Glow */
        .product-image-area {
            flex: 1;
            min-width: 320px;
            display: flex;
            justify-content: center;
        }

        .artwork-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
        }

        .album-artwork {
            width: 100%;
            height: auto;
            position: relative;
            z-index: 2;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1), 
                        box-shadow 0.8s ease;
        }

        .artwork-wrapper::after {
            content: '';
            position: absolute;
            top: 5%; left: 5%; right: 5%; bottom: 5%;
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            filter: blur(50px);
            opacity: 0;
            z-index: 1;
            transition: opacity 0.8s ease, transform 0.8s ease;
            pointer-events: none;
        }

        .artwork-wrapper:hover .album-artwork {
            transform: translateY(-20px) rotateY(-5deg) scale(1.03); 
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .artwork-wrapper:hover::after {
            opacity: 0.4;
            transform: translateY(-10px) scale(1.2);
            animation: pulseGlow 3s infinite alternate ease-in-out;
        }

        @keyframes pulseGlow {
            from { opacity: 0.3; filter: blur(50px); }
            to { opacity: 0.5; filter: blur(70px); }
        }

        /* Details */
        .product-details-area {
            flex: 1;
            min-width: 320px;
            text-align: left;
        }

        .product-category {
            color: var(--gold);
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
            font-weight: 400;
        }

        h1.product-title {
            font-size: clamp(2.2rem, 5vw, 3rem);
            letter-spacing: 8px;
            margin: 0 0 15px 0;
            font-weight: 100;
        }

        .price-tag {
            font-size: 2rem;
            font-weight: 200;
            margin-bottom: 25px;
            color: #fff;
            letter-spacing: 2px;
        }

        .product-description {
            line-height: 1.9;
            color: #ccc;
            font-weight: 300;
            margin-bottom: 40px;
            font-size: 1.05rem;
            border-left: 2px solid var(--gold);
            padding-left: 25px;
        }

        .order-controls {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .qty-label {
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--gold);
            font-weight: 400;
        }

        #quantity-input {
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            width: 70px;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
        }

        .sku-footer {
            margin-top: 50px;
            padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.08);
            font-size: 0.65rem;
            color: #555;
            letter-spacing: 3px;
        }

        #paypal-button-container { width: 100%; margin-top: 10px; }

        /* Mobile Logic: Centering & Stacking */
        @media (max-width: 768px) {
            .page-title { letter-spacing: 8px; }
            .product-grid { 
                padding: 40px 20px; 
                flex-direction: column; 
                align-items: center; 
                gap: 40px; 
            }
            .product-image-area, .product-details-area {
                width: 100%;
                min-width: unset;
            }
            .product-description { border-left: none; padding-left: 0; text-align: center; }
            h1.product-title, .price-tag, .product-details-area { text-align: center; }
            .order-controls { justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="store-container">
        <h1 class="page-title">STORE</h1>

        <div class="product-grid">
            
            <div class="product-image-area">
                <div class="artwork-wrapper">
                    <img src="/images/Saviour-album-cover.jpg" alt="Saviour Album" class="album-artwork">
                </div>
            </div>

            <div class="product-details-area">
                <span class="product-category">Physical CD Edition</span>
                <h1 class="product-title">SAVIOUR</h1>
                <div class="price-tag">£10.00</div>

                <div class="product-description">
                    <em style="color: var(--gold);">Saviour</em> for string orchestra and piano<br><br>
                    Experience the debut classical album by Tim Seymour. This limited physical edition features high-fidelity audio 
                    and includes an immediate digital companion download.
                </div>

                <div class="order-controls">
                    <span class="qty-label">Qty</span>
                    <input type="number" id="quantity-input" value="1" min="1" max="10">
                </div>
                
                <div id="paypal-button-container"></div>

                <div class="sku-footer">
                    UPC: 1 99199 21168 4 &nbsp; | &nbsp; SKU: SAV-CD-001
                </div>
            </div>

        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://www.paypal.com/sdk/js?client-id=ASW-6sgbSRCiG98RzAtTbnan3OlZ1Yb1yA09GO6GwAOdelFoyrXnZrS4Yi3AhHqWLEqRx-PqBNYkv8qW&currency=GBP"></script>

    <script>
        fetch('/menu.html').then(res => res.text()).then(data => document.getElementById('nav-placeholder').innerHTML = data);
        fetch('/footer.html').then(res => res.text()).then(data => document.getElementById('footer-placeholder').innerHTML = data);

        function initPayPal() {
            paypal.Buttons({
                style: { layout: 'vertical', color: 'gold', shape: 'rect', label: 'paypal' },
                createOrder: function(data, actions) {
                    const qty = document.getElementById('quantity-input').value;
                    const total = (10.00 * qty).toFixed(2);
                    return actions.order.create({
                        purchase_units: [{
                            description: "Saviour CD - Tim Seymour",
                            amount: {
                                currency_code: "GBP",
                                value: total,
                                breakdown: { item_total: { currency_code: "GBP", value: total } }
                            },
                            items: [{
                                name: "Saviour CD",
                                unit_amount: { currency_code: "GBP", value: "10.00" },
                                quantity: qty,
                                sku: "199199211684"
                            }]
                        }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        alert('Order successful! Your journey has begun, ' + details.payer.name.given_name);
                    });
                }
            }).render('#paypal-button-container');
        }
        window.addEventListener('load', initPayPal);
    </script>
</body>
</html>
