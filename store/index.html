<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store | Tim Seymour Composer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">

    <style>
        body, html { 
            margin: 0; padding: 0; 
            background-color: #0a0a0a; 
            color: #FFFFFF; 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
        }
        
        .store-container { 
            max-width: 1200px; 
            margin: 140px auto 100px; 
            padding: 0 20px; 
            text-align: center; 
        }
        
        h1 { 
            font-size: clamp(2rem, 8vw, 2.8rem); 
            letter-spacing: 12px; 
            margin-bottom: 60px; 
            font-weight: 100; 
            text-transform: uppercase;
        }

        .album-showcase {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .album-artwork {
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .purchase-details {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .purchase-details h2 {
            font-weight: 200;
            letter-spacing: 6px;
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-transform: uppercase;
        }

        .price-tag {
            color: #D4AF37;
            font-size: 1.6rem;
            letter-spacing: 3px;
            margin-bottom: 30px;
            font-weight: 300;
        }

        #paypal-button-container {
            width: 100%;
            min-height: 150px; /* Ensures space is reserved so it doesn't jump */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        #footer-placeholder { 
            margin-top: 100px; 
            padding-bottom: 40px; 
        }
    </style>
</head>
<body>

    <script src="https://www.paypal.com/sdk/js?client-id=ASW-6sgbSRCiG98RzAtTbnan3OIZ1Yb1yA09GO6GwAOcPq7-f4e9zGzV3u6M8I1Jp6S7O9N7-8Z&currency=GBP"></script>

    <div id="nav-placeholder"></div>

    <div class="store-container">
        <h1>STORE</h1>

        <div class="album-showcase">
            <img src="/images/Saviour-album-cover.jpg" alt="Saviour Album Cover" class="album-artwork">

            <div class="purchase-details">
                <h2>SAVIOUR</h2>
                <p style="color: #888; letter-spacing: 3px; font-weight: 200; margin-bottom: 10px; text-transform: uppercase; font-size: 0.8rem;">
                    Physical CD & Digital Download
                </p>
                <div class="price-tag">£10.00 GBP</div>
                
                <div id="paypal-button-container"></div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        // 1. Fetch Nav/Footer
        fetch('/menu.html').then(res => res.text()).then(data => {
            document.getElementById('nav-placeholder').innerHTML = data;
        });
        fetch('/footer.html').then(res => res.text()).then(data => {
            document.getElementById('footer-placeholder').innerHTML = data;
        });

        // 2. PayPal Render (The "Fix")
        // We check if the PayPal SDK loaded, then render
        function initPayPal() {
            if (window.paypal) {
                paypal.Buttons({
                    style: {
                        layout: 'vertical',
                        color:  'gold',
                        shape:  'rect',
                        label:  'paypal'
                    },
                    createOrder: function(data, actions) {
                        return actions.order.create({
                            purchase_units: [{
                                description: "Saviour - Tim Seymour - CD",
                                amount: {
                                    currency_code: "GBP",
                                    value: "10.00"
                                }
                            }]
                        });
                    },
                    onApprove: function(data, actions) {
                        return actions.order.capture().then(function(details) {
                            alert('Transaction completed by ' + details.payer.name.given_name + '!');
                        });
                    }
                }).render('#paypal-button-container');
            }
        }

        // Run the init function after the page loads
        window.addEventListener('load', initPayPal);

        // 3. Sticky Nav
        window.onscroll = function() {
            var nav = document.getElementById('main-nav');
            if (nav) {
                nav.style.background = (window.pageYOffset > 50) ? "rgba(10, 10, 10, 0.98)" : "rgba(10, 10, 10, 0.95)";
            }
        };
    </script>
</body>
</html>
