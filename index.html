<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawyered Up Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 50px; 
            user-select: none; 
            -webkit-user-select: none;
        }
        
        .player-container, #playlist {
            width: 400px;
            box-sizing: border-box;
        }

        .player-container { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            background: #d3d3d3; 
            padding: 10px 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        audio { 
            height: 40px;
            flex-grow: 1;
            filter: grayscale(1) invert(1);
        }
        
        .skip-btn {
            background: #1e1e1e;
            color: #d3d3d3;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background 0.3s;
            touch-action: none;
        }
        .skip-btn:hover { background: #000; }
        .skip-btn:active { transform: scale(0.9); }

        #playlist { 
            list-style: none; 
            padding: 10px; 
            background: #1e1e1e;
            border-radius: 15px;
            border: 1px solid #333;
        }

        .track { 
            padding: 15px; 
            cursor: pointer; 
            border-radius: 10px;
            transition: all 0.3s;
            border-left: 5px solid transparent;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        .track:hover { background: #2a2a2a; }
        .track.active { 
            border-left: 5px solid #d3d3d3; 
            background: #333; 
            color: #d3d3d3; 
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <button class="skip-btn" id="prevBtn">«</button>
        <audio id="audio" controls controlsList="nodownload" oncontextmenu="return false;" preload="auto">
            <source id="audio-source" src="Lawyered Up Pt1.m4a" type="audio/mp4">
        </audio>
        <button class="skip-btn" id="nextBtn">»</button>
    </div>

    <ul id="playlist">
        <li class="track active" data-src="Lawyered Up Pt1.m4a">Lawyered Up - Part 1</li>
        <li class="track" data-src="Lawyered Up Pt2.m4a">Lawyered Up - Part 2</li>
        <li class="track" data-src="Lawyered Up Pt3.m4a">Lawyered Up - Part 3</li>
    </ul>

    <script>
        const audio = document.getElementById('audio');
        const source = document.getElementById('audio-source');
        const tracks = Array.from(document.querySelectorAll('.track'));
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        let holdTimer;
        let scrubInterval;
        let isScrubbing = false;
        let pressStartTime;

        function playTrack(trackElement) {
            if (!trackElement) return;
            source.src = trackElement.getAttribute('data-src');
            audio.load();
            audio.play();
            tracks.forEach(t => t.classList.remove('active'));
            trackElement.classList.add('active');
        }

        function skipNext() {
            let currentIdx = tracks.findIndex(t => t.classList.contains('active'));
            let nextIdx = (currentIdx + 1) % tracks.length;
            playTrack(tracks[nextIdx]);
        }

        function skipPrev() {
            let currentIdx = tracks.findIndex(t => t.classList.contains('active'));
            let prevIdx = (currentIdx - 1 + tracks.length) % tracks.length;
            playTrack(tracks[prevIdx]);
        }

        // --- Controller Logic ---

        function onDown(e, direction) {
            e.preventDefault();
            pressStartTime = Date.now();
            isScrubbing = false;

            holdTimer = setTimeout(() => {
                isScrubbing = true;
                scrubInterval = setInterval(() => {
                    audio.currentTime += (direction === 'next' ? 5 : -5);
                }, 100);
            }, 250);
        }

        function onUp(e, direction) {
            clearTimeout(holdTimer);
            clearInterval(scrubInterval);

            if (!pressStartTime) return;

            const pressDuration = Date.now() - pressStartTime;
            pressStartTime = null;

            // If it wasn't a long hold (scrub), treat as a click
            if (pressDuration < 250 && !isScrubbing) {
                if (direction === 'next') skipNext();
                if (direction === 'prev') skipPrev();
            }
            isScrubbing = false;
        }

        // Bind Next Button
        nextBtn.addEventListener('mousedown', (e) => onDown(e, 'next'));
        nextBtn.addEventListener('touchstart', (e) => onDown(e, 'next'), {passive: false});
        
        // Bind Prev Button
        prevBtn.addEventListener('mousedown', (e) => onDown(e, 'prev'));
        prevBtn.addEventListener('touchstart', (e) => onDown(e, 'prev'), {passive: false});

        // Global Release
        window.addEventListener('mouseup', (e) => {
            // We don't know the direction here, but the variables handle the cleanup
            onUp(e, (holdTimer && !isScrubbing) ? (e.target === nextBtn ? 'next' : 'prev') : null);
        });

        // Specific Button Release (Ensures correct skip direction)
        nextBtn.addEventListener('mouseup', (e) => onUp(e, 'next'));
        nextBtn.addEventListener('touchend', (e) => onUp(e, 'next'), {passive: false});
        
        prevBtn.addEventListener('mouseup', (e) => onUp(e, 'prev'));
        prevBtn.addEventListener('touchend', (e) => onUp(e, 'prev'), {passive: false});

        // Playlist click
        tracks.forEach(track => {
            track.addEventListener('click', function() { playTrack(this); });
        });

        audio.addEventListener('ended', skipNext);
    </script>
</body>
</html>
