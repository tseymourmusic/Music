<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store | Tim Seymour Composer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="menu.css">

    <style>
        body, html { 
            margin: 0; padding: 0; 
            background-color: #1a1f21; 
            color: #FFFFFF; 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
        }
        
        .store-container { 
            max-width: 800px; 
            margin: 120px auto 100px; 
            padding: 0 20px; 
            text-align: center; 
        }
        
        h1 { 
            font-size: 2.8rem; 
            letter-spacing: 12px; 
            margin-bottom: 60px; 
            font-weight: 100; 
            text-transform: uppercase;
            color: #fff;
        }

        /* FRAMING THE PAYPAL EMBED */
        .paypal-card {
            background: #fdfdfd; 
            padding: 40px 20px;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 550px;
            margin: 0 auto;
            color: #333; 
            min-height: 300px; /* Prevents the 'empty' look while loading */
        }

        #paypal-container-WSNG66GZ9UJNS img {
            max-width: 100% !important;
            height: auto !important;
            margin-bottom: 20px;
        }

        #footer-placeholder {
            margin-top: 100px;
            padding-bottom: 40px;
        }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="store-container">
        <h1>STORE</h1>

        <div class="paypal-card">
            <script src="https://www.paypal.com/sdk/js?client-id=BAAdMZFpDHq_vhwEOk_MkZnxIRSxonRmcBWVSk72RsLZjiNtJq1d1b8zr3Efv-N4OeP-TF-ciuBH9J_hTI&components=hosted-buttons&disable-funding=venmo&currency=GBP"></script>
            <div id="paypal-container-WSNG66GZ9UJNS"></div>
            <script>
              paypal.HostedButtons({
                hostedButtonId: "WSNG66GZ9UJNS",
              }).render("#paypal-container-WSNG66GZ9UJNS")
            </script>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        // Load Menu
        fetch('menu.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
            });

        // Load Footer
        fetch('footer.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });

        // Scroll Logic
        window.onscroll = function() {
            var nav = document.getElementById('main-nav');
            if (nav) {
                nav.style.background = (window.pageYOffset > 50) ? "rgba(10, 10, 10, 0.98)" : "rgba(10, 10, 10, 0.95)";
            }
        };
    </script>
</body>
</html>
