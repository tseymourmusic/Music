<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter of Support | Tales For All Time</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/menu.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; 
            color: #FFFFFF;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        .viewer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 140px 20px 100px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 { 
            font-family: 'Cinzel', serif; /* Switch from Montserrat */
            font-size: clamp(1.4rem, 5vw, 2.4rem); /* Slightly tightened for Cinzel */
            letter-spacing: 12px; 
            margin-bottom: 60px; 
            font-weight: 400; /* Cinzel looks best at 400 for headers */
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            color: #FFFFFF;
        }

        /* THE GOLD RIMMED VELVET POP BOX - ENHANCED */
        .letter-wrapper {
            position: relative;
            width: 100%;
            max-width: 850px;
            background: #fff;
            border-radius: 2px;
            margin-bottom: 80px;
            line-height: 0; 

            /* 1. INCREASED BORDER INTENSITY (0.4 to 0.8) */
            border: 1px solid rgba(212, 175, 55, 0.8); 

            /* 2. ENHANCED GLOW STACK */
            box-shadow: 
                0 5px 15px rgba(0,0,0,0.5),      
                0 30px 80px rgba(0,0,0,0.8),     
                /* Wider, more vibrant gold halo */
                0 0 40px 5px rgba(212, 175, 55, 0.35); 
        
            z-index: 1; 
        }

        .letter-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 2px;
        }

        /* MATCHING THE CHAPTER I BUTTON STYLE */
        .back-link {
            display: inline-block;
            padding: 15px 40px;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            color: #D4AF37;
            text-decoration: none;
            border: 1px solid #D4AF37;
            background: rgba(212, 175, 55, 0.05);
            text-transform: uppercase;
            transition: all 0.4s ease;
            animation: pulse-glow 3s infinite;
            cursor: pointer;
        }

        @keyframes pulse-glow {
            0%, 100% { 
                box-shadow: 0 0 5px rgba(212, 175, 55, 0.1); 
                border-color: rgba(212, 175, 55, 0.4); 
            }
            50% { 
                box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); 
                border-color: rgba(212, 175, 55, 1); 
            }
        }

        .back-link:hover {
            background: #D4AF37;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media screen and (max-width: 768px) {
            .viewer-container {
                padding: 100px 15px 60px;
            }

            h1 {
                letter-spacing: 4px; 
                font-size: 1.4rem;
            }

            .letter-wrapper {
                margin-bottom: 50px;
            }

            .back-link {
                padding: 12px 30px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="viewer-container">
        <h1>Letter of Support</h1>

        <div class="letter-wrapper">
            <img src="/images/lcv-endorsement-letter-for-tim-seymour.jpg" 
                 alt="Letter of Support" 
                 class="letter-image">
        </div>

        <a href="/music/tales-for-all-time/index.html#bottom" class="back-link">
            RETURN TO THE TALES
        </a>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        // Load Menu
        fetch('/menu.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
            });

        // Load Footer
        fetch('/footer.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });

        // Nav Scroll Effect
        window.onscroll = function() {
            var nav = document.getElementById('main-nav');
            if (nav) {
                nav.style.background = (window.pageYOffset > 50) ? "rgba(10, 10, 10, 0.98)" : "rgba(10, 10, 10, 0.95)";
            }
        };
    </script>

</body>
</html>
