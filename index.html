<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawyered Up Soundtrack</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        
        /* Playlist Styling */
        #playlist { list-style: none; padding: 0; width: 300px; margin-top: 20px; }
        .track { 
            padding: 15px; 
            background: #1e1e1e; 
            margin-bottom: 5px; 
            cursor: pointer; 
            border-radius: 4px;
            transition: background 0.3s;
        }
        .track:hover { background: #333; }
        .track.active { border-left: 5px solid #1db954; background: #282828; color: #1db954; }

        audio { width: 300px; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>Lawyered Up Soundtrack</h1>

    <!-- The Audio Player -->
    <audio id="audio" controls preload="auto">
        <source id="audio-source" src="Lawyered Up Pt1.m4a" type="audio/mp4">
        Your browser does not support the audio element.
    </audio>

    <!-- The Playlist -->
    <ul id="playlist">
        <li class="track active" data-src="Lawyered Up Pt1.m4a">Lawyered Up - Part 1</li>
        <li class="track" data-src="Lawyered Up Pt2.m4a">Lawyered Up - Part 2</li>
        <li class="track" data-src="Lawyered Up Pt3.m4a">Lawyered Up - Part 3</li>
    </ul>

    <script>
        const audio = document.getElementById('audio');
        const source = document.getElementById('audio-source');
        const tracks = document.querySelectorAll('.track');

        tracks.forEach(track => {
            track.addEventListener('click', function() {
                // Get the file from data-src
                const nextTrack = this.getAttribute('data-src');
                
                // Change source and reload
                source.src = nextTrack;
                audio.load();
                audio.play();
                
                // Update active styling
                tracks.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Automatically play next song when one ends
        audio.addEventListener('ended', function() {
            let current = document.querySelector('.track.active');
            let next = current.nextElementSibling;
            
            if (next) {
                next.click(); // Mimic a click on the next track
            }
        });
    </script>

</body>
</html>
