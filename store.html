<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store | Tim Seymour Composer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="menu.css">

    <style>
        body, html { 
            margin: 0; padding: 0; 
            background-color: #1a1f21; 
            color: #FFFFFF; 
            font-family: 'Montserrat', sans-serif; 
        }
        
        .store-container { 
            max-width: 1200px; 
            margin: 120px auto 100px; 
            padding: 0 20px; 
            text-align: center; 
        }
        
        h1 { 
            font-size: 2.8rem; 
            letter-spacing: 12px; 
            margin-bottom: 60px; 
            font-weight: 100; 
            text-transform: uppercase;
        }

        /* THE CARD: Wide enough to prevent the "skinny stack" */
        .paypal-card {
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px 20px;
            border-radius: 8px;
            max-width: 800px; 
            margin: 0 auto;
            min-height: 500px;
            
            /* The key: treat the card as a centering flexbox */
            display: flex;
            justify-content: center;
        }

        /* THE INNER WRAPPER: Forces the PayPal widget to stay centered and wide */
        #paypal-container-WSNG66GZ9UJNS {
            width: 100%;
            max-width: 550px; /* The "Desktop" sweet spot */
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
            text-align: center;
        }

        /* Specifically forcing the PayPal-generated content to center */
        #paypal-container-WSNG66GZ9UJNS > div {
            margin: 0 auto !important;
        }

        #footer-placeholder { 
            margin-top: 100px; 
            padding-bottom: 40px; 
        }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="store-container">
        <h1>STORE</h1>

        <div class="paypal-card">
            <div id="paypal-container-WSNG66GZ9UJNS">
                <script src="https://www.paypal.com/sdk/js?client-id=BAAdMZFpDHq_vhwEOk_MkZnxIRSxonRmcBWVSk72RsLZjiNtJq1d1b8zr3Efv-N4OeP-TF-ciuBH9J_hTI&components=hosted-buttons&disable-funding=venmo&currency=GBP"></script>
                <script>
                  paypal.HostedButtons({
                    hostedButtonId: "WSNG66GZ9UJNS",
                  }).render("#paypal-container-WSNG66GZ9UJNS")
                </script>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        // Load Menu
        fetch('menu.html').then(res => res.text()).then(data => {
            document.getElementById('nav-placeholder').innerHTML = data;
        });

        // Load Footer
        fetch('footer.html').then(res => res.text()).then(data => {
            document.getElementById('footer-placeholder').innerHTML = data;
        });

        // Sticky Nav
        window.onscroll = function() {
            var nav = document.getElementById('main-nav');
            if (nav) {
                nav.style.background = (window.pageYOffset > 50) ? "rgba(10, 10, 10, 0.98)" : "rgba(10, 10, 10, 0.95)";
            }
        };
    </script>
</body>
</html>
