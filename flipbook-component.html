<div class="flipbook-wrapper">
    <div id="flipbook-viewport">
        <canvas id="canvas-left" width="0" height="0"></canvas>
        <canvas id="canvas-right" width="0" height="0"></canvas>
    </div>
    
    <div class="flipbook-controls">
        <button class="flip-btn" id="prev-page" title="Previous Page">
            <i class="fas fa-chevron-left"></i>
        </button>
        
        <span class="page-info">
            PAGE <span id="page-num">1-2</span> / <span id="page-count">0</span>
        </span>
        
        <button class="flip-btn" id="next-page" title="Next Page">
            <i class="fas fa-chevron-right"></i>
        </button>
    </div>
</div>
