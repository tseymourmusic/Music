<div class="flipbook-wrapper">
    <div id="flipbook-viewport">
        <canvas id="canvas-left"></canvas>
        <canvas id="canvas-right"></canvas>
    </div>
    
    <div class="flipbook-controls">
        <button class="flip-btn" id="prev-page"><i class="fas fa-chevron-left"></i></button>
        <span class="page-info">Pages <span id="page-num">1-2</span> of <span id="page-count">0</span></span>
        <button class="flip-btn" id="next-page"><i class="fas fa-chevron-right"></i></button>
    </div>
</div>
