<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Composer Portfolio | Soundtracks</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --accent: #d3d3d3;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 600px;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .subtitle {
            font-size: 0.9rem;
            letter-spacing: 4px;
            color: #888;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .project-card {
            border: 1px solid #333;
            padding: 30px;
            border-radius: 4px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            background: linear-gradient(45deg, #1a1a1a, #121212);
        }

        .project-card:hover {
            border-color: var(--accent);
            background: #1e1e1e;
            transform: translateY(-5px);
        }

        .project-card h2 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .project-card p {
            font-size: 0.8rem;
            color: #888;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .footer {
            margin-top: 60px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Original Scores</h1>
        <div class="subtitle">Composer / Sound Designer</div>

        <div class="project-list">
            <!-- Link to your Lawyered Up Page -->
            <a href="Lawyered-Up.html" class="project-card">
                <h2>Lawyered Up</h2>
                <p>Original Motion Picture Soundtrack</p>
            </a>

            <!-- Link to your Homologies Page -->
            <a href="homologies.html" class="project-card">
                <h2>Homologies</h2>
                <p>Dramatic Short Film Score</p>
            </a>
            
            <!-- Link to any future projects -->
            <a href="#" class="project-card" style="opacity: 0.3; cursor: default;">
                <h2>Coming Soon</h2>
                <p>New Project in Development</p>
            </a>
        </div>

        <div class="footer">
            &copy; 2024 PORTFOLIO. ALL AUDIO CONTENT PROTECTED.
        </div>
    </div>

</body>
</html>
