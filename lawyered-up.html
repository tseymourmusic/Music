<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lawyered Up Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="player-container">
        <button class="skip-btn" id="prevBtn">«</button>
        
        <div class="console">
            <audio id="audio" controls controlsList="nodownload">
                <source id="audio-source" src="audio/Lawyered Up Pt1.m4a" type="audio/mp4">
            </audio>
            <div id="track-title">Lawyered Up - Part 1</div>
        </div>

        <button class="skip-btn" id="nextBtn">»</button>
    </div>

    <ul id="playlist">
        <li class="track active" data-src="audio/Lawyered Up Pt1.m4a">Lawyered Up - Part 1</li>
        <li class="track" data-src="audio/Lawyered Up Pt2.m4a">Lawyered Up - Part 2</li>
        <li class="track" data-src="audio/Lawyered Up Pt3.m4a">Lawyered Up - Part 3</li>
    </ul>

    <script src="player.js"></script>
</body>
</html>
