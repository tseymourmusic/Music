<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter of Support | Tales For All Time</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">

<style>
    body, html {
        margin: 0;
        padding: 0;
        background-color: #1a1f21; 
        color: #FFFFFF;
        font-family: 'Montserrat', sans-serif;
    }

    .viewer-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 120px 20px 100px;
        min-height: 100vh;
    }

    h1 { 
        font-size: 2.8rem; 
        letter-spacing: 12px; 
        margin-bottom: 60px; 
        font-weight: 100; 
        text-transform: uppercase;
        text-align: center;
    }

    /* THE VELVET POP BOX */
    .letter-wrapper {
        position: relative;
        width: 100%;
        max-width: 900px;
        background: #fff;
        aspect-ratio: 1 / 1.414;
        border-radius: 2px;
        margin-bottom: 80px;

        /* MULTI-LAYER SHADOW */
        box-shadow: 
            0 5px 15px rgba(0,0,0,0.5),      /* Sharp edge shadow */
            0 30px 80px rgba(0,0,0,0.8),     /* Main depth shadow */
            0 0 40px rgba(197, 160, 89, 0.1); /* Subtle gold ambient glow */
            
        /* This prevents the iframe from clipping the shadow */
        z-index: 1; 
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
    }

        /* THE BUTTON STYLING */
        .back-link {
            text-decoration: none;
            font-family: 'Montserrat', sans-serif; /* Change to Cinzel if Chapter I uses it */
            font-weight: 300;
            font-size: 1rem;
            letter-spacing: 4px;
            color: #f1d592; /* Match the gold exactly */
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid #f1d592;
            background: transparent;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* THE HOVER GLOW (The "Pop") */
        .back-link:hover {
            color: #fff;
            border-color: #fff;
            background-color: rgba(241, 213, 146, 0.1); /* Subtle gold tint inside */
    
            /* This creates the 'bloom' effect around the button */
            filter: drop-shadow(0 0 8px rgba(241, 213, 146, 0.6)); 
            transform: translateY(-2px);
        }
</style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="viewer-container">
        <h1>Letter of Support</h1>

        <div class="letter-wrapper">
            <iframe src="/pdfs/lcv-endorsement-letter-for-tim-seymour.pdf#view=FitH&toolbar=0&navpanes=0"></iframe>
        </div>

        <a href="/music/tales-for-all-time/index.html#bottom" class="back-link">
        Return to Tales
        </a>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        fetch('/menu.html').then(res => res.text()).then(data => {
            document.getElementById('nav-placeholder').innerHTML = data;
        });

        fetch('/footer.html').then(res => res.text()).then(data => {
            document.getElementById('footer-placeholder').innerHTML = data;
        });
    </script>

</body>
</html>
