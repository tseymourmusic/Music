<style>
    body, html {
        margin: 0;
        padding: 0;
        background-color: #1a1f21; 
        color: #FFFFFF;
        font-family: 'Montserrat', sans-serif;
    }

    .viewer-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 120px 20px 100px;
        min-height: 100vh;
        box-sizing: border-box; /* Ensures padding doesn't push width over 100% */
    }

    h1 { 
        font-size: clamp(1.5rem, 8vw, 2.8rem); /* Fluid sizing */
        letter-spacing: 12px; 
        margin-bottom: 60px; 
        font-weight: 100; 
        text-transform: uppercase;
        text-align: center;
        width: 100%;
    }

    .letter-wrapper {
        position: relative;
        width: 100%;
        max-width: 900px;
        background: #fff;
        aspect-ratio: 1 / 1.414; /* Standard A4 ratio */
        border-radius: 2px;
        margin-bottom: 80px;
        box-shadow: 
            0 5px 15px rgba(0,0,0,0.5),
            0 30px 80px rgba(0,0,0,0.8),
            0 0 40px rgba(197, 160, 89, 0.1);
        z-index: 1; 
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
    }

    .back-link {
        display: inline-block;
        padding: 12px 35px;
        font-family: 'Cinzel', serif;
        font-size: 0.8rem;
        letter-spacing: 0.15em;
        color: #FFFFFF;
        text-decoration: none;
        border: 1px solid #D4AF37;
        background: rgba(212, 175, 55, 0.1);
        text-transform: uppercase;
        transition: all 0.3s ease;
        animation: pulse-glow 3s infinite;
        cursor: pointer;
    }

    @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); border-color: rgba(212, 175, 55, 0.5); }
        50% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); border-color: rgba(212, 175, 55, 1); }
    }

    .back-link:hover {
        background: rgba(212, 175, 55, 0.3);
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
        transform: translateY(-2px);
    }

    /* --- MOBILE FIXES --- */
    @media screen and (max-width: 768px) {
        .viewer-container {
            padding: 100px 15px 60px; /* Tighter padding for mobile */
        }

        h1 {
            letter-spacing: 4px; /* Shrunk spacing so it fits on one/two lines */
            margin-bottom: 30px;
            font-size: 1.6rem;
        }

        .letter-wrapper {
            aspect-ratio: auto; /* Kill the ratio on mobile */
            height: 60vh; /* Set a fixed height so the "Resume" button is visible */
            margin-bottom: 40px;
        }
    }
</style>
