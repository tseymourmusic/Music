<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store | Tim Seymour Composer</title>
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/menu.css">

    <style>
        .store-container { 
            max-width: 1100px; 
            margin: 160px auto 100px; 
            padding: 0 20px; 
        }

        /* The Main Store Grid */
        .product-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 60px;
            align-items: flex-start;
            background: rgba(255, 255, 255, 0.02);
            padding: 60px 40px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* LEFT COLUMN: Image & Glow Interaction */
        .product-image-area {
            flex: 1;
            min-width: 320px;
            display: flex;
            justify-content: center;
        }

        .artwork-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
        }

        .album-artwork {
            width: 100%;
            height: auto;
            position: relative;
            z-index: 2;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1), 
                        box-shadow 0.6s ease;
        }

        /* The Gold Glow Effect */
        .artwork-wrapper::after {
            content: '';
            position: absolute;
            top: 10%; left: 10%; right: 10%; bottom: 10%;
            background: var(--gold);
            filter: blur(60px);
            opacity: 0;
            z-index: 1;
            transition: opacity 0.6s ease, transform 0.6s ease;
            pointer-events: none;
        }

        /* Hover States: Lift + Glow */
        .artwork-wrapper:hover .album-artwork {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 45px 90px rgba(0,0,0,0.9);
        }

        .artwork-wrapper:hover::after {
            opacity: 0.25; /* Subtle gold aura */
            transform: translateY(-10px) scale(1.1);
        }

        /* RIGHT COLUMN: Details */
        .product-details-area {
            flex: 1;
            min-width: 320px;
            text-align: left;
        }

        .product-category {
            color: var(--gold);
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        h1.product-title {
            font-size: clamp(2rem, 5vw, 2.8rem);
            letter-spacing: 5px;
            margin: 0 0 15px 0;
            font-weight: 200;
            text-transform: uppercase;
        }

        .price-tag {
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 25px;
            color: #fff;
        }

        .product-description {
            line-height: 1.8;
            color: #bbb;
            font-weight: 300;
            margin-bottom: 40px;
            font-size: 1rem;
            border-left: 1px solid var(--gold);
            padding-left: 20px;
        }

        /* Order Controls */
        .order-controls {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .qty-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #666; }
        
        #quantity-input {
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            width: 70px;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            border-radius: 2px;
        }

        .sku-footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.65rem;
            color: #444;
            letter-spacing: 2px;
        }

        #paypal-button-container { width: 100%; margin-top: 10px; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .product-grid { padding: 30px 20px; gap: 40px; }
            .product-details-area { text-align: center; }
            .product-description { border-left: none; padding-left: 0; }
            .order-controls { justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="store-container">
        <div class="product-grid">
            
            <div class="product-image-area">
                <div class="artwork-wrapper">
                    <img src="/images/Saviour-album-cover.jpg" alt="Saviour Album" class="album-artwork">
                </div>
            </div>

            <div class="product-details-area">
                <span class="product-category">Limited Physical Edition</span>
                <h1 class="product-title">SAVIOUR</h1>
                <div class="price-tag">£10.00</div>

                <div class="product-description">
                    The debut album from Tim Seymour. A journey through cinematic soundscapes and emotive orchestration. 
                    Includes a high-quality physical CD and an immediate digital download link.
                </div>

                <div class="order-controls">
                    <span class="qty-label">Quantity</span>
                    <input type="number" id="quantity-input" value="1" min="1" max="10">
                </div>
                
                <div id="paypal-button-container"></div>

                <div class="sku-footer">
                    BARCODE: 1 99199 21168 4 &nbsp; | &nbsp; SKU: SAV-CD-LIVE
                </div>
            </div>

        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://www.paypal.com/sdk/js?client-id=ASW-6sgbSRCiG98RzAtTbnan3OlZ1Yb1yA09GO6GwAOdelFoyrXnZrS4Yi3AhHqWLEqRx-PqBNYkv8qW&currency=GBP"></script>

    <script>
        // Load navigation components
        fetch('/menu.html').then(res => res.text()).then(data => document.getElementById('nav-placeholder').innerHTML = data);
        fetch('/footer.html').then(res => res.text()).then(data => document.getElementById('footer-placeholder').innerHTML = data);

        function initPayPal() {
            paypal.Buttons({
                style: { layout: 'vertical', color: 'gold', shape: 'rect', label: 'paypal' },
                createOrder: function(data, actions) {
                    const qty = document.getElementById('quantity-input').value;
                    const total = (10.00 * qty).toFixed(2);

                    return actions.order.create({
                        purchase_units: [{
                            description: "Saviour CD - Tim Seymour",
                            amount: {
                                currency_code: "GBP",
                                value: total,
                                breakdown: { item_total: { currency_code: "GBP", value: total } }
                            },
                            items: [{
                                name: "Saviour CD",
                                unit_amount: { currency_code: "GBP", value: "10.00" },
                                quantity: qty,
                                sku: "199199211684"
                            }]
                        }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        alert('Order successful! Thank you, ' + details.payer.name.given_name);
                    });
                }
            }).render('#paypal-button-container');
        }

        window.addEventListener('load', initPayPal);
    </script>
</body>
</html>
