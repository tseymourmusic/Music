<div class="flipbook-wrapper">
    <div id="flipbook-viewport">
        <canvas id="flipbook-canvas"></canvas>
    </div>
    
    <div class="flipbook-controls">
        <button class="flip-btn" id="prev-page">
            <i class="fas fa-chevron-left"></i> Previous
        </button>
        <span class="page-info">Page <span id="page-num">0</span> of <span id="page-count">0</span></span>
        <button class="flip-btn" id="next-page">
            Next <i class="fas fa-chevron-right"></i>
        </button>
    </div>
</div>
