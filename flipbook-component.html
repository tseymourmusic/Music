<div class="flipbook-viewport">

        <div class="fb-loader">
            <div class="fb-spinner"></div>
            <p>ILLUMINATING THE SCORE...</p>
        </div>
    </div>
    
    <div class="fb-controls">

        <button onclick="fbNextPage()"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
</div>
