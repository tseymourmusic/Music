<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter of Support | Tales For All Time</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #1a1f21; 
            color: #FFFFFF;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        .viewer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 120px 20px 100px; /* Matched to Contact page margins */
            min-height: 100vh;
        }

        /* MATCHED TO CONTACT PAGE H1 */
        h1 { 
            font-size: 2.8rem; 
            letter-spacing: 12px; 
            margin-bottom: 60px; 
            font-weight: 100; 
            text-transform: uppercase;
            text-align: center;
        }

        .letter-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            background: #fff;
            aspect-ratio: 1 / 1.414;
            /* Enhanced Shadow for that "Floating" look */
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 80px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* MATCHED TO YOUR EMAIL LINK STYLING */
        .back-link {
            text-decoration: none;
            font-weight: 300;
            font-size: 1.2rem;
            letter-spacing: 3px;
            background: linear-gradient(to right, #c5a059, #f1d592, #c5a059);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.4s ease;
            display: inline-block;
            padding: 15px 30px;
            border: 1px solid rgba(241, 213, 146, 0.2); /* Subtle frame */
            border-radius: 4px;
            text-transform: uppercase;
        }

        .back-link:hover {
            text-shadow: 0 0 15px rgba(241, 213, 146, 0.6);
            transform: translateY(-2px);
            border-color: rgba(241, 213, 146, 0.5);
            opacity: 0.9;
        }

        @media screen and (max-width: 768px) {
            h1 { font-size: 1.8rem; letter-spacing: 6px; }
            .viewer-container { padding-top: 100px; }
        }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="viewer-container">
        <h1>Letter of Support</h1>

        <div class="letter-wrapper">
            <iframe src="/pdfs/lcv-endorsement-letter-for-tim-seymour.pdf#view=FitH&toolbar=0&navpanes=0"></iframe>
        </div>

        <a href="/" class="back-link">
            Return to Odyssey
        </a>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        fetch('/menu.html').then(res => res.text()).then(data => {
            document.getElementById('nav-placeholder').innerHTML = data;
        });

        fetch('/footer.html').then(res => res.text()).then(data => {
            document.getElementById('footer-placeholder').innerHTML = data;
        });
    </script>

</body>
</html>
