<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawyered Up Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 50px; 
            user-select: none; /* Prevents text highlighting while holding buttons */
        }
        
        .player-container, #playlist {
            width: 400px;
            box-sizing: border-box;
        }

        .player-container { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            background: #d3d3d3; 
            padding: 10px 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        audio { 
            height: 40px;
            flex-grow: 1;
            filter: grayscale(1) invert(1);
        }
        
        .skip-btn {
            background: #1e1e1e;
            color: #d3d3d3;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background 0.3s;
            touch-action: manipulation; /* Improves mobile response */
        }
        .skip-btn:hover { background: #000; }
        .skip-btn:active { transform: scale(0.9); }

        #playlist { 
            list-style: none; 
            padding: 10px; 
            background: #1e1e1e;
            border-radius: 15px;
            border: 1px solid #333;
        }

        .track { 
            padding: 15px; 
            cursor: pointer; 
            border-radius: 10px;
            transition: all 0.3s;
            border-left: 5px solid transparent;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        .track:hover { background: #2a2a2a; }
        .track.active { 
            border-left: 5px solid #d3d3d3; 
            background: #333; 
            color: #d3d3d3; 
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <button class="skip-btn" id="prevBtn">«</button>
        
        <audio id="audio" controls controlsList="nodownload" oncontextmenu="return false;" preload="auto">
            <source id="audio-source" src="Lawyered Up Pt1.m4a" type="audio/mp4">
        </audio>

        <button class="skip-btn" id="nextBtn">»</button>
    </div>

    <ul id="playlist">
        <li class="track active" data-src="Lawyered Up Pt1.m4a">Lawyered Up - Part 1</li>
        <li class="track" data-src="Lawyered Up Pt2.m4a">Lawyered Up - Part 2</li>
        <li class="track" data-src="Lawyered Up Pt3.m4a">Lawyered Up - Part 3</li>
    </ul>

    <script>
        const audio = document.getElementById('audio');
        const source = document.getElementById('audio-source');
        const tracks = document.querySelectorAll('.track');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        let holdTimer;
        let scrubInterval;
        let isHolding = false;

        function playTrack(trackElement) {
            source.src = trackElement.getAttribute('data-src');
            audio.load();
            audio.play();
            tracks.forEach(t => t.classList.remove('active'));
            trackElement.classList.add('active');
        }

        // --- BUTTON LOGIC ---

        function handleButtonDown(direction) {
            isHolding = false;
            // Wait 200ms to see if this is a "hold" or a "click"
            holdTimer = setTimeout(() => {
                isHolding = true;
                scrubInterval = setInterval(() => {
                    audio.currentTime += (direction === 'next' ? 5 : -5);
                }, 150);
            }, 200);
        }

        function handleButtonUp(actionType) {
            clearTimeout(holdTimer);
            clearInterval(scrubInterval);

            if (!isHolding) {
                // It was just a click, so skip track
                if (actionType === 'next') skipNext();
                else skipPrev();
            }
        }

        function skipNext() {
            let current = document.querySelector('.track.active');
            let next = current.nextElementSibling;
            playTrack(next ? next : tracks[0]);
        }

        function skipPrev() {
            let current = document.querySelector('.track.active');
            let prev = current.previousElementSibling;
            playTrack(prev ? prev : tracks[tracks.length - 1]);
        }

        // Event Listeners for Next Button
        nextBtn.addEventListener('mousedown', () => handleButtonDown('next'));
        nextBtn.addEventListener('mouseup', () => handleButtonUp('next'));
        nextBtn.addEventListener('mouseleave', () => handleButtonUp('next'));

        // Event Listeners for Prev Button
        prevBtn.addEventListener('mousedown', () => handleButtonDown('prev'));
        prevBtn.addEventListener('mouseup', () => handleButtonUp('prev'));
        prevBtn.addEventListener('mouseleave', () => handleButtonUp('prev'));

        // Playlist click
        tracks.forEach(track => {
            track.addEventListener('click', function() { playTrack(this); });
        });

        audio.addEventListener('ended', skipNext);
    </script>
</body>
</html>
