<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Tim Seymour Composer</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@100;200;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">

    <style>
        body, html { 
            margin: 0; padding: 0; 
            background-color: #0a0a0a; 
            color: #FFFFFF; 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
        }

        .contact-container { 
            max-width: 900px; 
            margin: 120px auto 100px; 
            padding: 0 20px; 
            text-align: center; 
        }

        h1 { 
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 8vw, 3.5rem); 
            letter-spacing: 12px; 
            margin-bottom: 20px; 
            font-weight: 400; 
            text-transform: uppercase;
            color: #D4AF37;
        }

        .email-block {
            margin-bottom: 60px;
        }

        .email-link {
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: #aaa;
            transition: all 0.4s ease;
            display: inline-block;
            word-wrap: break-word;
            max-width: 100%;
        }

        .email-link:hover {
            color: #D4AF37;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        /* --- STYLED CONTACT FORM --- */
        .form-card {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(255, 255, 255, 0.02);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .signup-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .signup-form input, .signup-form textarea {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 1px;
            outline: none;
            transition: 0.3s;
            width: 100%;
            box-sizing: border-box;
        }

        .signup-form textarea {
            min-height: 150px;
            resize: vertical;
        }

        .signup-form input:focus, .signup-form textarea:focus {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.05);
        }

        .signup-submit {
            background: transparent;
            border: 1px solid #D4AF37;
            color: #D4AF37;
            padding: 18px;
            font-family: 'Cinzel', serif;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .signup-submit:hover {
            background: #D4AF37;
            color: #000;
        }

        #success-msg {
            padding: 40px 20px;
        }

        #success-msg h3 {
            font-family: 'Cinzel', serif;
            color: #D4AF37;
            letter-spacing: 4px;
            margin-bottom: 15px;
        }

        #footer-placeholder { 
            margin-top: 100px; 
            padding-bottom: 40px; 
        }

        @media screen and (max-width: 480px) {
            .contact-container { margin-top: 100px; }
            .form-card { padding: 25px; }
            .email-link { font-size: 0.9rem; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="contact-container">
        <h1>CONTACT</h1>

        <div class="email-block">
            <a href="mailto:TSeymourMusic@Gmail.com" class="email-link">
                TSEYMOURMUSIC@GMAIL.COM
            </a>
        </div>

        <div class="form-card">
            <div id="form-content">
                <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
                
                <form action="https://docs.google.com/forms/d/e/1FAIpQLSdYRrRYJtL-DDGGj44HstORJ6jUQvWmArNzsoozt4Z_49bI9w/formResponse" 
                      method="post" 
                      target="hidden_iframe" 
                      onsubmit="submitted=true;" 
                      class="signup-form">

                    <input type="text" name="entry.90022461" placeholder="NAME" required>
                    <input type="email" name="entry.1977158895" placeholder="EMAIL ADDRESS" required>
                    <textarea name="entry.844073854" placeholder="YOUR MESSAGE" required></textarea>

                    <button type="submit" class="signup-submit">SEND MESSAGE</button>
                </form>
            </div>

            <div id="success-msg" style="display:none;">
                <h3>MESSAGE SENT</h3>
                <p style="color: #888; font-size: 0.9rem; letter-spacing: 1px;">Thank you for reaching out. I will get back to you shortly.</p>
                <br>
                <button onclick="location.reload()" class="signup-submit" style="padding: 10px 25px;">SEND ANOTHER</button>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        var submitted = false;

        // FETCH PATHS
        fetch('/menu.html').then(res => res.text()).then(data => {
            document.getElementById('nav-placeholder').innerHTML = data;
        });

        fetch('/footer.html').then(res => res.text()).then(data => {
            document.getElementById('footer-placeholder').innerHTML = data;
        });

        // Form Success Logic
        const iframe = document.getElementById('hidden_iframe');
        if (iframe) {
            iframe.onload = function() {
                if (submitted) {
                    document.getElementById('form-content').style.display = 'none';
                    document.getElementById('success-msg').style.display = 'block';
                }
            };
        }

        window.onscroll = function() {
            var nav = document.getElementById('main-nav');
            if (nav) {
                nav.style.background = (window.pageYOffset > 50) ? "rgba(10, 10, 10, 0.98)" : "rgba(10, 10, 10, 0.95)";
            }
        };
    </script>
</body>
</html>
